# Deploy Auth Backend
# Trigger: woodpecker-cli pipeline create ravencloak-org/ravencloak --branch main --var DEPLOY_TO=deploy
when:
  - event: [manual, deployment]
    evaluate: 'CI_PIPELINE_DEPLOY_TO == "deploy" || CI_PIPELINE_EVENT == "deployment"'

steps:
  - name: deploy
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      KEYCLOAK_BASE_URL:
        from_secret: keycloak_base_url
      KEYCLOAK_ADMIN_CLIENT_ID:
        from_secret: keycloak_admin_client_id
      KEYCLOAK_ADMIN_CLIENT_SECRET:
        from_secret: keycloak_admin_client_secret
      KEYCLOAK_ISSUER_PREFIX:
        from_secret: keycloak_issuer_prefix
      KEYCLOAK_SAAS_ISSUER_URI:
        from_secret: keycloak_saas_issuer_uri
      SAAS_ADMIN_CLIENT_SECRET:
        from_secret: saas_admin_client_secret
      DB_HOST:
        from_secret: db_host
      DB_PORT:
        from_secret: db_port
      DB_NAME:
        from_secret: db_name
      DB_USERNAME:
        from_secret: db_username
      DB_PASSWORD:
        from_secret: db_password
      SPRING_PROFILES_ACTIVE:
        from_secret: spring_profiles_active
      OTEL_EXPORTER_OTLP_ENDPOINT:
        from_secret: otel_exporter_otlp_endpoint
    commands:
      - echo $GITHUB_TOKEN | docker login ghcr.io -u ravencloak-org --password-stdin
      - echo "Pulling latest image..."
      - docker pull ghcr.io/ravencloak-org/ravencloak:latest
      - docker network create auth-network 2>/dev/null || true
      - docker stop auth-backend || true
      - docker rm auth-backend || true
      - echo "Starting auth-backend..."
      - docker run -d --name auth-backend --restart unless-stopped --network auth-network -p 8091:8080 -e KEYCLOAK_BASE_URL="$KEYCLOAK_BASE_URL" -e KEYCLOAK_ADMIN_CLIENT_ID="$KEYCLOAK_ADMIN_CLIENT_ID" -e KEYCLOAK_ADMIN_CLIENT_SECRET="$KEYCLOAK_ADMIN_CLIENT_SECRET" -e KEYCLOAK_ISSUER_PREFIX="$KEYCLOAK_ISSUER_PREFIX" -e KEYCLOAK_SAAS_ISSUER_URI="$KEYCLOAK_SAAS_ISSUER_URI" -e SAAS_ADMIN_CLIENT_SECRET="$SAAS_ADMIN_CLIENT_SECRET" -e DB_HOST="$DB_HOST" -e DB_PORT="$DB_PORT" -e DB_NAME="$DB_NAME" -e DB_USERNAME="$DB_USERNAME" -e DB_PASSWORD="$DB_PASSWORD" -e SPRING_PROFILES_ACTIVE="$SPRING_PROFILES_ACTIVE" -e OTEL_SERVICE_NAME=kos-auth-spring -e OTEL_EXPORTER_OTLP_ENDPOINT="$OTEL_EXPORTER_OTLP_ENDPOINT" -e OTEL_TRACES_EXPORTER=otlp -e OTEL_METRICS_EXPORTER=otlp -e OTEL_LOGS_EXPORTER=otlp ghcr.io/ravencloak-org/ravencloak:latest
      - docker image prune -f
      - echo "Backend deployment complete!"
      - docker ps | grep auth-backend

  - name: deploy-frontend
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo $GITHUB_TOKEN | docker login ghcr.io -u ravencloak-org --password-stdin
      - echo "Pulling latest frontend image..."
      - docker pull ghcr.io/ravencloak-org/ravencloak-web:latest
      - docker stop auth-frontend || true
      - docker rm auth-frontend || true
      - echo "Starting auth-frontend..."
      - docker run -d --name auth-frontend --restart unless-stopped --network auth-network -p 8090:80 ghcr.io/ravencloak-org/ravencloak-web:latest
      - docker image prune -f
      - echo "Frontend deployment complete!"
      - docker ps | grep auth-frontend

