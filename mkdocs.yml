site_name: KOS Auth Backend
site_description: Multi-tenant authentication backend with Spring Boot/Kotlin and Keycloak
repo_url: https://github.com/dsjkeeplearning/kos-auth-backend
repo_name: dsjkeeplearning/kos-auth-backend

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Design: design.md
  - Database: database.md
  - API:
      - API Reference: api-reference.md
      - OpenAPI Spec: api/openapi.md
      - SCIM 2.0: api/scim.md
  - SDK Integration:
      - Installation: sdk/installation.md
      - Configuration: sdk/configuration.md
      - API Reference: sdk/api-reference.md
      - Usage Guide: sdk/usage-guide.md
      - Startup Sync: sdk/startup-sync.md
  - Modules:
      - Keycloak SPI: modules/keycloak-spi.md
  - Infrastructure: infrastructure.md
  - Deployment:
      - CI/CD: deployment/ci-cd.md
      - Docker: deployment/docker.md
  - ADR:
      - Overview: adr/index.md
      - "001: Reactive Stack": adr/001-reactive-stack.md
      - "002: Shadow Tables": adr/002-keycloak-shadow-tables.md
      - "003: UUIDv7": adr/003-uuidv7-primary-keys.md
      - "004: SCIM Provisioning": adr/004-scim-provisioning.md
      - "005: Paired Clients": adr/005-paired-clients.md
      - "006: ParadeDB Search": adr/006-paradedb-search.md
      - "007: Audit Trail": adr/007-audit-trail-jsonb.md

plugins:
  - search
  - neoteroi.mkdocsoad
  - macros:
      module_name: docs/macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - toc:
      permalink: true

extra_css:
  - css/mkdocsoad.css
