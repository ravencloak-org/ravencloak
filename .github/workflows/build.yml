name: Build

on:
  push:
    branches: [main, 'fix/*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test all modules
        run: |
          ./gradlew :test bootJar :keycloak-spi:shadowJar :scim-common:jar --no-daemon

      - name: Upload auth JARs
        uses: actions/upload-artifact@v4
        with:
          name: auth-jars
          retention-days: 30
          path: |
            build/libs/auth-*.jar
            keycloak-spi/build/libs/keycloak-user-storage-spi-*.jar
            !**/*-plain.jar
