name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy Auth Backend
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          CONTAINER_NAME: sys-gw-01
        run: |
          # Login to GHCR
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull latest image
          docker pull ghcr.io/ravencloak-org/ravencloak:latest

          # Stop and remove existing container (only this workflow knows the name)
          docker stop $CONTAINER_NAME 2>/dev/null || true
          docker rm -f $CONTAINER_NAME 2>/dev/null || true

          # Also clean up legacy name if it exists
          docker stop auth-backend 2>/dev/null || true
          docker rm -f auth-backend 2>/dev/null || true

          # Ensure network exists
          docker network create auth-network 2>/dev/null || true

          # Run with obscure name, restart policy, and no-new-privileges
          docker run -d \
            --name $CONTAINER_NAME \
            --restart always \
            --network auth-network \
            --security-opt no-new-privileges:true \
            --stop-signal SIGTERM \
            --stop-timeout 30 \
            -p 8091:8080 \
            -p 9090:9090 \
            -e DB_HOST="${{ secrets.DB_HOST }}" \
            -e DB_PORT="${{ secrets.DB_PORT }}" \
            -e DB_NAME="${{ secrets.DB_NAME }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e KEYCLOAK_BASE_URL="${{ secrets.KEYCLOAK_BASE_URL }}" \
            -e KEYCLOAK_ISSUER_PREFIX="${{ secrets.KEYCLOAK_ISSUER_PREFIX }}" \
            -e KEYCLOAK_SAAS_ISSUER_URI="${{ secrets.KEYCLOAK_SAAS_ISSUER_URI }}" \
            -e KEYCLOAK_ADMIN_CLIENT_ID="${{ secrets.KEYCLOAK_ADMIN_CLIENT_ID }}" \
            -e KEYCLOAK_ADMIN_CLIENT_SECRET="${{ secrets.KEYCLOAK_ADMIN_CLIENT_SECRET }}" \
            -e SAAS_ADMIN_CLIENT_SECRET="${{ secrets.SAAS_ADMIN_CLIENT_SECRET }}" \
            -e SPRING_PROFILES_ACTIVE="${{ secrets.SPRING_PROFILES_ACTIVE }}" \
            -e OTEL_SERVICE_NAME=kos-auth-spring \
            -e OTEL_SDK_DISABLED=true \
            -e SERVER_FORWARD_HEADERS_STRATEGY=framework \
            ghcr.io/ravencloak-org/ravencloak:latest

          # Clean up old images
          docker image prune -f

          echo "=== Deployed ==="
          docker ps --filter name=$CONTAINER_NAME --format "{{.ID}} | {{.Status}} | {{.Ports}}"
